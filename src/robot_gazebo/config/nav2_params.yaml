amcl:
  ros__parameters:
    use_sim_time: True
    set_initial_pose: True
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
      
    # --- 1. 里程計噪音：大幅調高，告訴系統 Odom 非常滑 ---
    # 數值越大，代表對 Odom 的不信任度越高
    alpha1: 0.5  # 旋轉造成的旋轉誤差
    alpha2: 0.5  # 平移造成的旋轉誤差
    alpha3: 0.5  # 平移造成的平移誤差
    alpha4: 0.5  # 旋轉造成的平移誤差
    alpha5: 0.5  # 橫移 (Omni 專用) 造成的誤差

    # --- 2. 更新頻率：大幅縮短更新門檻 ---
    # 只要動 5 公分或轉 3 度就強迫光達對齊一次
    update_min_d: 0.05  # 預設 0.25 -> 改為 0.05
    update_min_a: 0.05  # 預設 0.2 -> 改為 0.05

    # --- 3. 傳感器模型：讓系統「死心塌地」相信光達 ---
    # z_hit: 正確掃描到地圖牆壁的機率 (越高越聽話)
    # z_rand: 隨機雜訊機率 (越低越好)
    z_hit: 0.95         # 預設 0.5 -> 調到最高
    z_rand: 0.05        # 預設 0.5 -> 降到最低
    sigma_hit: 0.1      # 預設 0.2 -> 讓匹配更嚴苛，對不準就重算
    
    # --- 4. 解析度與粒子數：增加計算量換取精準度 ---
    max_beams: 180      # 預設 60 -> 增加取樣點，讓牆壁輪廓更清晰
    max_particles: 3000 # 增加粒子上限，能處理更細微的位移偏差
    min_particles: 1000
    
    # 讓 TF 轉換容忍度低一點，強迫系統必須即時算準
    transform_tolerance: 0.5 
    
    robot_model_type: "nav2_amcl::OmniMotionModel"
    laser_model_type: "likelihood_field"
    scan_topic: /scan

map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

filter_mask_server:
  ros__parameters:
    use_sim_time: True
    # Mega mod
    yaml_filename: "RobotSot_keepout.yaml"

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: True
    type: 0  # 0 代表這是一個 Keepout Filter
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


